pre-commit:
  parallel: true
  commands:
    typecheck:
      run: pnpm typecheck
      glob: "src/**/*.{ts,tsx}"
    lint:
      glob: "src/**/*.{ts,tsx}"
      run: pnpm eslint {staged_files}
    format:
      glob: "{src,tests,scripts}/**/*.{ts,tsx,css,md,json}"
      run: pnpm prettier --write {staged_files}
      stage_fixed: true

commit-msg:
  commands:
    conventional:
      run: pnpm commitlint --edit {1}
