<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stockast — UI Kit</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Newsreader:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="ui-kit/tokens/tokens.css" />

  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: var(--sk-bg); }
    body { font-family: "Plus Jakarta Sans", -apple-system, system-ui, sans-serif; color: var(--sk-text); }
    #root { width: 100%; min-height: 100%; }
    /* Smooth-scroll anchor jumps */
    html { scroll-behavior: smooth; }
    /* Hide scrollbars inside artboards (matches walkthrough) */
    .sk-screen::-webkit-scrollbar,
    .sk-screen *::-webkit-scrollbar { display: none; }
  </style>

  <!-- React + Babel (pinned) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Primitives -->
  <script type="text/babel" src="ui-kit/icons/icons.jsx"></script>
  <script type="text/babel" src="ui-kit/components/ui.jsx"></script>

  <!-- Asset libraries (all SVG-based) -->
  <script type="text/babel" src="ui-kit/illustrations/glyphs.jsx"></script>
  <script type="text/babel" src="ui-kit/weather/weather.jsx"></script>
  <script type="text/babel" src="ui-kit/branding/welcomes.jsx"></script>
  <script type="text/babel" src="ui-kit/dashboard/charts.jsx"></script>
  <script type="text/babel" src="ui-kit/illustrations/empty-states.jsx"></script>
  <script type="text/babel" src="ui-kit/components/notifications.jsx"></script>

  <!-- Belanja variants + onboarding decorations (shown in the kit) -->
  <script type="text/babel" src="ui-kit/dashboard/belanja.jsx"></script>
  <script type="text/babel" src="ui-kit/onboarding/onboarding.jsx"></script>

  <!-- UI Kit app -->
  <script type="text/babel" src="ui-kit.jsx"></script>
</body>
</html>
